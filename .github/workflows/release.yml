name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run_version:
        description: 'SEMVER for dry-run (e.g. 0.3.0 or 0.3.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash -euo pipefail {0}

env:
  XCODE_VERSION: '26.3'

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve & validate version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SEMVER: $VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Log Xcode version
        run: xcodebuild -version

      - name: Restore App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_PRIVATE_KEY" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "ASC_PRIVATE_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Create keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$DEVELOPER_ID_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write Developer.xcconfig
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          cat > AIview/Config/Developer.xcconfig <<EOF
          DEVELOPMENT_TEAM = $DEVELOPMENT_TEAM
          CODE_SIGN_IDENTITY = Developer ID Application
          CODE_SIGN_STYLE = Manual
          EOF

      - name: Archive
        run: |
          xcodebuild \
            -project AIview.xcodeproj \
            -scheme AIview \
            -configuration Release \
            -archivePath build/AIview.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Notarize & package
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ./scripts/notarize.sh --archive build/AIview.xcarchive --version "${VERSION}"

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/AIview-${{ env.VERSION }}.dmg
            dist/AIview-${{ env.VERSION }}.zip
            dist/AIview-${{ env.VERSION }}.dmg.sha256
            dist/AIview-${{ env.VERSION }}.zip.sha256

      - name: Cleanup keychain & secrets
        if: always()
        run: |
          set +e
          [[ -n "${KEYCHAIN_PATH:-}" ]] && security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/asc/AuthKey.p8" "$RUNNER_TEMP/cert.p12"
          rm -f AIview/Config/Developer.xcconfig

  release-dry-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve & validate version
        run: |
          VERSION="${{ github.event.inputs.dry_run_version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SEMVER: $VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Log Xcode version
        run: xcodebuild -version

      - name: Restore App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_PRIVATE_KEY" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "ASC_PRIVATE_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Create keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$DEVELOPER_ID_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write Developer.xcconfig
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          cat > AIview/Config/Developer.xcconfig <<EOF
          DEVELOPMENT_TEAM = $DEVELOPMENT_TEAM
          CODE_SIGN_IDENTITY = Developer ID Application
          CODE_SIGN_STYLE = Manual
          EOF

      - name: Archive
        run: |
          xcodebuild \
            -project AIview.xcodeproj \
            -scheme AIview \
            -configuration Release \
            -archivePath build/AIview.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Notarize & package
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ./scripts/notarize.sh --archive build/AIview.xcarchive --version "${VERSION}"

      - name: List artifacts
        run: ls -la dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-dryrun-${{ env.VERSION }}
          path: dist/
          retention-days: 7

      - name: Cleanup keychain & secrets
        if: always()
        run: |
          set +e
          [[ -n "${KEYCHAIN_PATH:-}" ]] && security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/asc/AuthKey.p8" "$RUNNER_TEMP/cert.p12"
          rm -f AIview/Config/Developer.xcconfig
